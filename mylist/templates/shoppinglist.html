<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemeinschaftsplanung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --magenta: #c0006a;
            --bordeaux: #7a0035;
            --magenta-light: #e8006e;
            --bg: #faf5f8;
            --surface: #ffffff;
            --text: #2a1020;
            --text-muted: #8a6070;
            --border: #f0d8e6;
            --glow-magenta: 0 0 18px rgba(192, 0, 106, 0.25);
            --shadow-card: 0 4px 24px rgba(122, 0, 53, 0.1);
            --shadow-btn: 0 4px 20px rgba(192, 0, 106, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--bordeaux) 0%, var(--magenta) 100%);
            padding: 28px 32px 24px;
            box-shadow: 0 4px 30px rgba(122, 0, 53, 0.35);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: 40%;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        header h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        header p {
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 560px;
            margin: 32px auto;
            padding: 0 20px 100px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--magenta);
            box-shadow: var(--glow-magenta);
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s ease;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background: #fdf0f6;
        }

        .list-item input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }

        .list-item input[type="checkbox"]:checked {
            background: var(--magenta);
            border-color: var(--magenta);
            box-shadow: var(--glow-magenta);
        }

        .list-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 13px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .list-item label {
            font-size: 15px;
            font-weight: 400;
            color: var(--text);
            cursor: pointer;
            transition: color 0.2s;
        }

        .list-item input[type="checkbox"]:checked ~ label {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        .add-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--magenta) 0%, var(--bordeaux) 100%);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            flex-shrink: 0;
        }

        .add-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 28px rgba(192, 0, 106, 0.6);
        }

        .add-btn:active {
            transform: scale(0.96);
        }

        .card + .card {
            margin-top: 24px;
        }

        .card-header {
            justify-content: space-between;
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--border);
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.15s ease, background 0.15s ease;
            flex-shrink: 0;
        }

        .list-item:hover .delete-btn {
            color: var(--magenta);
        }

        .delete-btn:hover {
            background: rgba(192, 0, 106, 0.08);
        }
    </style>
</head>
<body>

    <header>
        <h1>Gemeinschaftsplanung</h1>
        <p>Die Anwendung fürs gemeinsame Planen</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="dot"></div>
                <span>Erledigungen</span>
                <button class="add-btn" onclick="addItem('erledigungen')">+</button>
            </div>
            {% for row in erledigungen %}
            <div class="list-item">
                <input type="checkbox" id="item-{{ row.id }}">
                <label for="item-{{ row.id }}">{{ row.name }}</label>
                <button class="delete-btn" onclick="deleteItem({{ row.id }}, this)">✕</button>
            </div>
            {% empty %}
            <div class="empty-state">
                <div class="icon">✅</div>
                Noch keine Einträge.<br>Tippe auf <strong>+</strong> um loszulegen.
            </div>
            {% endfor %}
        </div>

        <div class="card">
            <div class="card-header">
                <div class="dot"></div>
                <span>Besorgungen</span>
                <button class="add-btn" onclick="addItem('besorgungen')">+</button>
            </div>
            {% for row in besorgungen %}
            <div class="list-item">
                <input type="checkbox" id="item-{{ row.id }}">
                <label for="item-{{ row.id }}">{{ row.name }}</label>
                <button class="delete-btn" onclick="deleteItem({{ row.id }}, this)">✕</button>
            </div>
            {% empty %}
            <div class="empty-state">
                <div class="icon">🛒</div>
                Noch keine Einträge.<br>Tippe auf <strong>+</strong> um loszulegen.
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function deleteItem(id, btn) {
            let token = '{{ csrf_token }}';
            let formData = new FormData();
            formData.append('csrfmiddlewaretoken', token);
            fetch('/mylist/delete/' + id + '/', {
                method: 'POST',
                body: formData
            }).then(() => btn.closest('.list-item').remove());
        }

        function addItem(listType) {
            let itemName = prompt('Neues Element hinzufügen')
            if (!itemName || !itemName.trim()) return;
            let token = '{{ csrf_token }}';
            let formData = new FormData();
            formData.append('itemName', itemName.trim());
            formData.append('list_type', listType);
            formData.append('csrfmiddlewaretoken', token);
            fetch('/mylist/', {
                method: 'POST',
                body: formData
            }).then(() => location.reload());
        }
    </script>

</body>
</html>
