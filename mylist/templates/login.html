<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – Gemeinschaftsplanung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta: #c0006a;
            --bordeaux: #7a0035;
            --bg: #faf5f8;
            --surface: #ffffff;
            --text: #2a1020;
            --text-muted: #8a6070;
            --border: #f0d8e6;
            --glow-magenta: 0 0 18px rgba(192, 0, 106, 0.25);
            --shadow-card: 0 4px 24px rgba(122, 0, 53, 0.1);
            --shadow-btn: 0 4px 20px rgba(192, 0, 106, 0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--bordeaux) 0%, var(--magenta) 100%);
            padding: 28px 32px 24px;
            box-shadow: 0 4px 30px rgba(122, 0, 53, 0.35);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        header p {
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-card {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            padding: 36px 32px 32px;
            width: 100%;
            max-width: 380px;
        }

        .login-card h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--bordeaux);
            margin-bottom: 24px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--bg);
        }

        .field input:focus {
            border-color: var(--magenta);
            box-shadow: var(--glow-magenta);
            background: #fff;
        }

        .error {
            background: #fff0f5;
            border: 1px solid #f0b0cc;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--bordeaux);
            margin-bottom: 16px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--magenta) 0%, var(--bordeaux) 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            margin-top: 8px;
            transition: box-shadow 0.15s, transform 0.15s;
        }

        .btn-login:hover {
            box-shadow: 0 6px 28px rgba(192, 0, 106, 0.6);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <header>
        <h1>Gemeinschaftsplanung</h1>
        <p>Die Anwendung fürs gemeinsame Planen</p>
    </header>

    <div class="login-wrap">
        <div class="login-card">
            <h2>Anmelden</h2>

            {% if form.errors %}
            <div class="error">Benutzername oder Passwort falsch.</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="field">
                    <label for="id_username">Benutzername</label>
                    <input type="text" id="id_username" name="username"
                           autocomplete="username" autofocus>
                </div>
                <div class="field">
                    <label for="id_password">Passwort</label>
                    <input type="password" id="id_password" name="password"
                           autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Anmelden</button>
            </form>

            <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted);">
                Noch kein Konto?
                <a href="/register/" style="color:var(--magenta); text-decoration:none; font-weight:500;">Registrieren</a>
            </p>
        </div>
    </div>
</body>
</html>
